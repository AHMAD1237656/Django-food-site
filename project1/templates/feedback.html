{% extends "base.html" %}
{% load static %}

{% block title %}Feedback{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="text-center mb-4">
        <h2 class="display-5 text-primary fw-bold">💬 We Value Your Feedback</h2>
        <p class="text-muted">Please share your experience with us. It helps us serve you better!</p>
    </div>

    <div class="feedback-wrapper">
        <form class="feedback-form" action="{% url 'submit_feedback' %}" method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="name" class="form-label">Your Name</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Your Email</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email"
                    required>
            </div>

            <div class="mb-3">
                <label for="rating" class="form-label">Rate your experience</label>
                <select name="rating" id="rating" class="form-select" required>
                    <option value="" disabled selected>Select rating</option>
                    <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                    <option value="4">⭐⭐⭐⭐ Very Good</option>
                    <option value="3">⭐⭐⭐ Good</option>
                    <option value="2">⭐⭐ Fair</option>
                    <option value="1">⭐ Poor</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="comments" class="form-label">Your Comments</label>
                <textarea name="comments" id="comments" class="form-control" rows="4"
                    placeholder="Share your thoughts..." required></textarea>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">Send Feedback 💌</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
